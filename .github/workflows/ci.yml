name: Build, Test & Publish

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: 8
          distribution: temurin
          cache: maven

      - name: Install vendored dependencies
        run: |
          mkdir -p ~/.m2/repository
          # Clear any cached everest resolution state
          rm -rf ~/.m2/repository/org/marc/everest
          cp -r lib/maven-repo/* ~/.m2/repository/
          find ~/.m2/repository -name "*.lastUpdated" -delete 2>/dev/null || true
          echo "Installed vendored JARs:"
          find ~/.m2/repository/org/marc/everest -name "*.jar"

      - name: Build and test
        run: mvn -B -U clean install -s .mvn/settings.xml

      - name: Upload OMOD
        uses: actions/upload-artifact@v4
        with:
          name: omod
          path: omod/target/*.omod
          if-no-files-found: warn

      - name: Publish package
        if: github.event_name == 'release' && github.event.action == 'created'
        run: mvn -B -DskipTests -Dfindbugs.skip=true -Dpmd.skip=true -Dcpd.skip=true deploy -s .mvn/settings.xml
        env:
          RELEASE_USERNAME: ${{ secrets.RELEASE_USERNAME }}
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
